name: Build and push images

on:
  push:
    branches:
      - 'main'
      - 'dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/agentic-partners-integration
  UV_VERSION: "0.8.9"
  PYTHON_VERSION: "3.12"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image: agent-service
            containerfile: agent-service/Containerfile
            context: .
            build-args: |
              SERVICE_NAME=agent-service
              MODULE_NAME=agent_service.main
          - image: request-manager
            containerfile: request-manager/Containerfile
            context: .
            build-args: |
              SERVICE_NAME=request-manager
              MODULE_NAME=request_manager.main
          - image: rag-api
            containerfile: rag-service/Containerfile
            context: .
            build-args: ""
          - image: web-ui
            containerfile: pf-chat-ui/Containerfile
            context: pf-chat-ui
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version tags
        id: version
        run: |
          BRANCH="${{ github.ref_name }}"
          SHA_SHORT="${GITHUB_SHA::8}"

          TAGS="${{ env.REGISTRY }}/${{ matrix.image }}:${BRANCH}-${SHA_SHORT}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ matrix.image }}:${BRANCH}"

          if [ "${BRANCH}" = "main" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ matrix.image }}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.containerfile }}
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
