name: Build and push images

on:
  push:
    branches:
      - 'main'
      - 'dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent-service
            containerfile: agent-service/Containerfile
            context: .
            image: partner-agent-service
            build-args: |
              SERVICE_NAME=agent-service
              MODULE_NAME=agent_service.main
          - name: request-manager
            containerfile: request-manager/Containerfile
            context: .
            image: partner-request-manager
            build-args: |
              SERVICE_NAME=request-manager
              MODULE_NAME=request_manager.main
          - name: rag-api
            containerfile: rag-service/Containerfile
            context: .
            image: partner-rag-api
            build-args: ""
          - name: pf-chat-ui
            containerfile: pf-chat-ui/Containerfile
            context: pf-chat-ui
            image: partner-pf-chat-ui
            build-args: ""

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.containerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.ref_name }}-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
