{{- $fullName := include "partner-agent.fullname" . -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-pf-chat-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-agent.labels" . | nindent 4 }}
    app: {{ $fullName }}-pf-chat-ui
    component: pf-chat-ui
spec:
  replicas: {{ .Values.pfChatUi.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "partner-agent.selectorLabels" . | nindent 6 }}
      app: {{ $fullName }}-pf-chat-ui
  template:
    metadata:
      labels:
        {{- include "partner-agent.labels" . | nindent 8 }}
        app: {{ $fullName }}-pf-chat-ui
        component: pf-chat-ui
    spec:
      serviceAccountName: {{ include "partner-agent.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pf-chat-ui
        image: "{{ .Values.image.registry }}/{{ .Values.image.pfChatUi }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8080
          protocol: TCP
          name: http
        env:
        - name: API_ENDPOINT
          value: "http://{{ $fullName }}-request-manager:80"
        {{- if .Values.pfChatUi.resources }}
        resources:
          {{- toYaml .Values.pfChatUi.resources | nindent 10 }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-pf-chat-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-agent.labels" . | nindent 4 }}
    app: {{ $fullName }}-pf-chat-ui
spec:
  type: ClusterIP
  selector:
    {{- include "partner-agent.selectorLabels" . | nindent 4 }}
    app: {{ $fullName }}-pf-chat-ui
  ports:
  - name: http
    port: 3000
    targetPort: 8080
    protocol: TCP
