{{- $fullName := include "partner-agent.fullname" . -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-agent.labels" . | nindent 4 }}
type: Opaque
data:
  host: {{ printf "%s-postgresql" $fullName | b64enc | quote }}
  port: {{ "5432" | b64enc | quote }}
  dbname: {{ .Values.postgresql.database | b64enc | quote }}
  user: {{ .Values.postgresql.user | b64enc | quote }}
  password: {{ .Values.postgresql.password | b64enc | quote }}
  url: {{ printf "postgresql+asyncpg://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.user .Values.postgresql.password $fullName .Values.postgresql.database | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-llm-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "partner-agent.labels" . | nindent 4 }}
type: Opaque
data:
  llm-backend: {{ .Values.llm.backend | b64enc | quote }}
  {{- if .Values.llm.googleApiKey }}
  google-api-key: {{ .Values.llm.googleApiKey | b64enc | quote }}
  {{- else }}
  google-api-key: {{ "" | b64enc | quote }}
  {{- end }}
  gemini-model: {{ .Values.llm.geminiModel | b64enc | quote }}
  {{- if .Values.llm.openaiApiKey }}
  openai-api-key: {{ .Values.llm.openaiApiKey | b64enc | quote }}
  {{- else }}
  openai-api-key: {{ "" | b64enc | quote }}
  {{- end }}
  openai-model: {{ .Values.llm.openaiModel | b64enc | quote }}
  ollama-base-url: {{ .Values.llm.ollamaBaseUrl | b64enc | quote }}
  ollama-model: {{ .Values.llm.ollamaModel | b64enc | quote }}
